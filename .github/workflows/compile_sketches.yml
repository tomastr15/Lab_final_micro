name: Compilar Sketches Arduino

on:
  push:
    paths:
      - '**.ino'

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar arduino-cli y compilar
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "Keypad"
          arduino-cli lib install "LiquidCrystal I2C"
          arduino-cli lib install "Adafruit LiquidCrystal"
          arduino-cli lib install "Servo"
          arduino-cli compile --fqbn arduino:avr:uno Sketch_Parte1_LabMicro/
          arduino-cli compile --fqbn arduino:avr:uno Sketch_Arduino1_Parte2/
          arduino-cli compile --fqbn arduino:avr:uno Sketch_Arduino2_Parte2/
